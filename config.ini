[general]
# Base directory for logs
log_dir = logs
# Host to bind honeypots to (0.0.0.0 = all interfaces)
bind_host = 0.0.0.0
# Enable/disable specific honeypots
enable_ssh_cowrie = yes
enable_ics_conpot = yes
enable_creds_heralding = yes
enable_web_traps = yes
enable_db_traps = yes
enable_malware_capture = yes
enable_rdp_trap = yes

[ports]
# SSH honeypot (non-privileged port, use 22 if running as admin)
ssh_port = 2222
# ICS/SCADA ports (conpot)
modbus_port = 502
s7_port = 102
bacnet_port = 47808
# Credential capture ports
ftp_port = 21
smtp_port = 25
pop3_port = 110
imap_port = 143
http_creds_port = 8080
# Web traps
wordpress_port = 80
admin_port = 8081
api_port = 8082
# Database traps
elasticsearch_port = 9200
mongodb_port = 27017
# Malware capture
malware_http_port = 8888
malware_tftp_port = 69
# RDP trap
rdp_port = 3389
