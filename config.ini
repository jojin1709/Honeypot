[general]
# Base directory for logs
log_dir = logs
# Host to bind honeypots to (0.0.0.0 = all interfaces, 127.0.0.1 = local only)
bind_host = 0.0.0.0
# Enable/disable specific honeypots - set any to "no" to disable
# Core honeypots (1-7)
enable_ssh_cowrie = yes
enable_ics_conpot = yes
enable_creds_heralding = yes
enable_web_traps = yes
enable_db_traps = yes
enable_malware_capture = yes
enable_rdp_trap = yes
# New honeypots (8-17)
enable_smb = yes
enable_dns = yes
enable_sip = yes
enable_redis = yes
enable_vnc = yes
enable_telnet = yes
enable_memcached = yes
enable_mqtt = yes
enable_snmp = yes
enable_ntp = yes
# Feature toggles
enable_geoip = yes
enable_notifications = no
enable_correlation = yes
enable_log_rotation = yes
enable_intel_feeds = no
# Notification channels (configure via: python features/notifications.py)
telegram_alerts = no
discord_alerts = no
slack_alerts = no
email_alerts = no

[ports]
# === Core Honeypots (1-7) ===
# SSH honeypot (change to 22 if running as admin)
ssh_port = 2222
# ICS/SCADA
modbus_port = 502
s7_port = 102
bacnet_port = 47808
# Credential capture
ftp_port = 21
smtp_port = 25
pop3_port = 110
imap_port = 143
http_creds_port = 8080
# Web traps
wordpress_port = 80
admin_port = 8081
api_port = 8082
# Database traps
elasticsearch_port = 9200
mongodb_port = 27017
# Malware capture
malware_http_port = 8888
malware_tftp_port = 69
# RDP trap
rdp_port = 3389

# === New Honeypots (8-17) ===
smb_port = 445
dns_port = 53
sip_port = 5060
redis_port = 6379
vnc_port = 5900
telnet_port = 23
memcached_port = 11211
mqtt_port = 1883
snmp_port = 161
ntp_port = 123

[features]
# GeoIP: track attacker locations
geoip_db_path =
# Intel Feeds API keys (leave blank to disable)
abuseipdb_key =
virustotal_key =
shodan_key =
greynoise_key =
# Log rotation limits
log_max_size_mb = 50
log_retention_days = 30
