# Cowrie Configuration - SSH/Telnet Honeypot
# Records attacker commands and malware downloads

[honeypot]
listen_endpoints = tcp:2222:interface=0.0.0.0
enabled_services = ssh

[ssh]
enabled = yes
port = 2222
protocol = ssh
# SSH key file (will be auto-generated)
rsa_key_size = 2048
# Login credentials attackers can use
# username:password format
users = root:123456,admin:admin,user:password,test:test,ubuntu:ubuntu

[shell]
# Fake filesystem - simulate a real server
# Standard linux files/directories to fake
filesystem_file = share/cowrie/fs.pickle
# If no filesystem file exists, create a default one
filesystem_default = yes

[output_textlog]
enabled = yes
logfile = /mnt/d/Security Tools/honey pot/logs/ssh/cowrie.log

[output_jsonlog]
enabled = yes
logfile = /mnt/d/Security Tools/honey pot/logs/ssh/cowrie.json

[output_elasticsearch]
enabled = no

[output_file]
enabled = no
logfile = /mnt/d/Security Tools/honey pot/logs/ssh/audit.log

[telnet]
enabled = no
port = 2323

[database]
# Log to local file instead of database
enabled = no

[download]
# Capture malware files downloaded by attackers
enabled = yes
download_limit_size = 10485760  # 10MB
# Directory to store captured files
download_dir = /mnt/d/Security Tools/honey pot/logs/ssh/downloads
# Filename format
download_format = {peer_ip}_{timestamp}_{filename}

[sensor]
name = honeypot-lab-01

[ssh_key]
# Auto-generate SSH host key
auto_generate = yes
